name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build_wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16.2
        env:
          # 💡 先編譯一個版本 (3.10) 確保成功，節省你等待的時間
          CIBW_BUILD: "cp310-manylinux_x86_64"
          CIBW_BEFORE_BUILD: "pip install torch"
          # 🔥 終極修復：手動注入路徑並徹底排除所有 PyTorch 核心庫
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            LD_LIBRARY_PATH=$(python -c 'import torch; print(torch.utils.cmake_prefix_path + "/../lib")'):$LD_LIBRARY_PATH 
            auditwheel repair 
            --exclude libtorch_cpu.so 
            --exclude libtorch.so 
            --exclude libc10.so 
            --exclude libtorch_python.so 
            --exclude libshm.so 
            --exclude libgomp.so.1 
            -w {dest_dir} {wheel}

      - name: Store wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true 
          verbose: true